<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cephalon Ordis Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <button class="new-chat-btn" onclick="location.reload()">
                <i class="fas fa-plus"></i> New Transmission
            </button>
            <div class="history-list">
                <p class="section-title">Recent</p>
                <div class="history-item"><i class="far fa-message"></i> Ash Drop Locations</div>
                <div class="history-item"><i class="far fa-message"></i> Orbiter Status</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar-operator">OP</div>
                    <span>Operator</span>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="mobile-header">
                <i class="fas fa-bars"></i>
                <span>Ordis Terminal</span>
                <i class="fas fa-plus" onclick="location.reload()"></i>
            </header>

            <div class="chat-display" id="chat-display">
                <div class="message ai">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="content">
                        <p>Greetings, Operator! The Orbiter systems are online and syncing with the Origin System network. How may I assist you today?</p>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Message Cephalon Ordis..." rows="1"></textarea>
                    <button id="send-btn" title="Send Transmission"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="disclaimer">Ordis's logic core is cracked. Verify critical mission data.</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
